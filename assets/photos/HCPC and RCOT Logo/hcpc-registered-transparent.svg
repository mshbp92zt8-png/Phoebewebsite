<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="666" height="684" viewBox="0 0 666 684" role="img" aria-labelledby="title desc">
  <title id="title">HCPC registered logo</title>
  <desc id="desc">HCPC registered logo with transparent background.</desc>
  <defs>
    <style>
      .blue { fill: #004b7f; }
      .white { fill: #fff; }
      .hcpc {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 298px;
        font-weight: 400;
        letter-spacing: -7px;
      }
      .registered {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 144px;
        font-weight: 400;
        letter-spacing: -6px;
      }
      .url {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 82px;
        font-weight: 400;
        letter-spacing: -3px;
      }
    </style>
  </defs>

  <rect class="blue" x="2" y="2" width="662" height="355"/>
  <text class="hcpc white" x="20" y="264">hcpc</text>

  <rect class="white" x="4" y="360" width="655" height="199"/>
  <rect x="4" y="360" width="655" height="199" fill="none" stroke="#004b7f" stroke-width="5"/>
  <text class="registered blue" x="30" y="527">registered</text>

  <text class="url blue" x="0" y="657">www.hcpc-uk.org</text>
</svg>
